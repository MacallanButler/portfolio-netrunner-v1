<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Vibrant Neon Green Glow -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Sleek dark background with thin border -->
  <rect width="512" height="512" rx="110" fill="#0A0E12" stroke="#1E293B" stroke-width="12" />
  
  <!-- Cyberpunk grid/decor accents -->
  <line x1="80" y1="60" x2="432" y2="60" stroke="#1E293B" stroke-width="4" stroke-dasharray="8 12" />
  <line x1="80" y1="452" x2="432" y2="452" stroke="#1E293B" stroke-width="4" stroke-dasharray="8 12" />
  
  <!-- Cyberpunk Stencil 'M' - Red offset glitch -->
  <path
    d="M 110,390 L 110,130 L 256,276 L 402,130 L 402,390"
    fill="none"
    stroke="#FF003C"
    stroke-width="70"
    stroke-linecap="square"
    stroke-linejoin="miter"
    opacity="0.75"
    transform="translate(-6, -4)"
  />
  
  <!-- Cyberpunk Stencil 'M' - Core Green Glow Layer -->
  <path
    d="M 110,390 L 110,130 L 256,276 L 402,130 L 402,390"
    fill="none"
    stroke="#00FF00"
    stroke-width="70"
    stroke-linecap="square"
    stroke-linejoin="miter"
    filter="url(#neon-glow)"
  />

  <!-- Core White Stencil Layer (adds crisp sharpness inside the glow) -->
  <path
    d="M 110,390 L 110,130 L 256,276 L 402,130 L 402,390"
    fill="none"
    stroke="#FFFFFF"
    stroke-width="24"
    stroke-linecap="square"
    stroke-linejoin="miter"
    opacity="0.95"
  />

  <!-- Cyberpunk Corner Accents -->
  <rect x="75" y="75" width="25" height="4" fill="#00FF00" />
  <rect x="75" y="75" width="4" height="25" fill="#00FF00" />
  
  <rect x="412" y="412" width="25" height="4" fill="#00FF00" />
  <rect x="433" y="391" width="4" height="25" fill="#00FF00" />
</svg>
