<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <defs>
    <!-- Vibrant Green Neon Glow -->
    <filter id="neon-glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur" />
      <feMerge>
        <feMergeNode in="blur" />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- Circular Dark base with Glowing Border -->
  <circle cx="256" cy="256" r="230" fill="#0A0E12" stroke="#00FF00" stroke-width="22" filter="url(#neon-glow)" />
  
  <!-- Subtle green overlay/pulse fill -->
  <circle cx="256" cy="256" r="219" fill="#00FF00" fill-opacity="0.08" />

  <!-- Red Offset Glitch Shadow Layer -->
  <text 
    x="252" 
    y="252" 
    font-family="Courier New, Courier, monospace" 
    font-size="200" 
    font-weight="900" 
    fill="#FF003C" 
    text-anchor="middle" 
    dominant-baseline="central"
    opacity="0.75"
  >MB</text>

  <!-- Glowing Green Core Text Layer -->
  <text 
    x="256" 
    y="256" 
    font-family="Courier New, Courier, monospace" 
    font-size="200" 
    font-weight="900" 
    fill="#00FF00" 
    text-anchor="middle" 
    dominant-baseline="central"
    filter="url(#neon-glow)"
  >MB</text>

  <!-- Core Crisp White Layer for legibility at small sizes -->
  <text 
    x="256" 
    y="256" 
    font-family="Courier New, Courier, monospace" 
    font-size="200" 
    font-weight="900" 
    fill="#FFFFFF" 
    text-anchor="middle" 
    dominant-baseline="central"
    opacity="0.95"
  >MB</text>
</svg>
