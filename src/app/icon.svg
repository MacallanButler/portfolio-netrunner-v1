<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="100%" height="100%">
  <!-- Circular Dark base with clean, sharp Green Border -->
  <circle cx="256" cy="256" r="230" fill="#0A0E12" stroke="#00FF00" stroke-width="24" />
  
  <!-- Sharp, defined bold Green M in Courier/monospace typography -->
  <text 
    x="256" 
    y="256" 
    font-family="Courier New, Courier, monospace" 
    font-size="300" 
    font-weight="900" 
    fill="#00FF00" 
    text-anchor="middle" 
    dominant-baseline="central"
  >M</text>
</svg>
